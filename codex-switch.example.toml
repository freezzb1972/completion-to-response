# Codex Model Switch — 配置模板
# 复制此文件为 codex-switch.toml 并填入真实 API Key

# Active backend: "nvidia" or "openai" or "custom"
active = "deepseek"

[backends.nvidia]
base_url = "https://integrate.api.nvidia.com/v1"
api_key = "YOUR_NVIDIA_API_KEY"
model = "meta/llama-3.1-8b-instruct"

[backends.openai]
base_url = "https://api.openai.com/v1"
api_key = "YOUR_OPENAI_API_KEY"
model = "gpt-5.4"

[backends.deepseek]
base_url = "https://api.deepseek.com"
api_key = "YOUR_DEEPSEEK_API_KEY"
model = "deepseek-v4-pro"

[backends.custom]
base_url = "http://localhost:8081/v1"
api_key = ""
model = ""

# Codex 模型名 → 后端:后端模型 映射
# 格式: "codex名" = "后端名:后端模型名"
# Codex 中切换模型名即可切换后端和模型
[model_map]
"gpt-5.5" = "deepseek:deepseek-v4-pro"
"gpt-5.4" = "deepseek:deepseek-v4-flash"
"gpt-5.1" = "nvidia:meta/llama-3.1-8b-instruct"
"gpt-5.0" = "nvidia:meta/llama-3.3-70b-instruct"
